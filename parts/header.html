<!-- Header template part for Colophon.
     Design principle: the starter header is minimal and functional.
     Site title + navigation. No decorative elements.
     Derived themes replace this with their own header personality.

     The skip link is NOT in this part. It is rendered in PHP on wp_body_open
     (Colophon\render_skip_link in inc/setup.php) so its text is translatable
     against the active locale instead of shipping hardcoded English here.
     There is exactly one skip link in the DOM, positioned directly after
     <body>, before this header. -->

<!-- wp:group {"tagName":"header","className":"colophon-site-header","style":{"spacing":{"padding":{"top":"var:preset|spacing|5","bottom":"var:preset|spacing|5","left":"var:preset|spacing|5","right":"var:preset|spacing|5"}}},"layout":{"type":"flex","flexWrap":"nowrap","justifyContent":"space-between","verticalAlignment":"center"}} -->
<header class="wp-block-group colophon-site-header" style="padding-top:var(--wp--preset--spacing--5);padding-bottom:var(--wp--preset--spacing--5);padding-left:var(--wp--preset--spacing--5);padding-right:var(--wp--preset--spacing--5)">
