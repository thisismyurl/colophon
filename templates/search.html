<!-- Search results template for Colophon.
     Shows "Results for: X" heading above a post list.
     No-results state orients the user and re-offers the search form.
     Pillar 6 (Resilience): the no-results state is an experience, not an empty page. -->

<!-- wp:template-part {"slug":"header"} /-->

<!-- wp:group {"tagName":"main","id":"main-content","className":"colophon-main colophon-search","layout":{"type":"constrained","contentSize":"720px"},"style":{"spacing":{"padding":{"top":"var:preset|spacing|10","bottom":"var:preset|spacing|20","left":"var:preset|spacing|5","right":"var:preset|spacing|5"}}}} -->
<main id="main-content" class="wp-block-group colophon-main colophon-search" style="padding-top:var(--wp--preset--spacing--10);padding-bottom:var(--wp--preset--spacing--20);padding-left:var(--wp--preset--spacing--5);padding-right:var(--wp--preset--spacing--5)">

	<!-- Search results heading (required per WCAG 2.1 1.3.1).
	     The query-title block renders "Search results for: X" as the h1. -->
	<!-- wp:query-title {"type":"search","level":1,"textAlign":"left"} /-->

	<!-- Results list -->
	<!-- wp:query {"queryId":1,"query":{"perPage":10,"postType":"post","order":"desc","orderBy":"relevance","inherit":true},"layout":{"type":"default"}} -->
	<div class="wp-block-query">

		<!-- wp:post-template {"layout":{"type":"default"}} -->

			<!-- wp:group {"style":{"spacing":{"blockGap":"var:preset|spacing|3","padding":{"bottom":"var:preset|spacing|8"},"margin":{"bottom":"var:preset|spacing|8"}},"border":{"bottom":{"color":"var:preset|color|base-rule","style":"solid","width":"1px"}}},"layout":{"type":"default"}} -->
			<div class="wp-block-group" style="padding-bottom:var(--wp--preset--spacing--8);margin-bottom:var(--wp--preset--spacing--8);border-bottom:1px solid var(--wp--preset--color--base-rule)">
				<!-- wp:post-date {"style":{"typography":{"fontSize":"var:preset|font-size|xs"},"color":{"text":"var:preset|color|base-mid"}}} /-->
				<!-- wp:post-title {"isLink":true,"style":{"typography":{"textDecoration":"none"},"color":{"text":"var:preset|color|base-black"}}} /-->
				<!-- Excerpt without a custom moreText: the post-title above is the link to
				     the full post, and a hardcoded "Read more" string can't be translated.
				     Omitting moreText keeps this template language-neutral. -->
				<!-- wp:post-excerpt /-->
			</div>
			<!-- /wp:group -->

		<!-- /wp:post-template -->

		<!-- No results state: search form for retry. -->
		<!-- wp:query-no-results -->
			<!-- wp:group {"style":{"spacing":{"padding":{"top":"var:preset|spacing|8","bottom":"var:preset|spacing|8"},"blockGap":"var:preset|spacing|6"}},"layout":{"type":"default"}} -->
			<div class="wp-block-group" style="padding-top:var(--wp--preset--spacing--8);padding-bottom:var(--wp--preset--spacing--8)">
				<!-- Search block with no custom label/buttonText: core supplies the
				     translated "Search" default for both, so no English ships to other locales. -->
				<!-- wp:search {"buttonUseIcon":true} /-->
			</div>
			<!-- /wp:group -->
		<!-- /wp:query-no-results -->

		<!-- wp:query-pagination {"layout":{"type":"flex","justifyContent":"space-between"}} -->
			<!-- wp:query-pagination-previous /-->
			<!-- wp:query-pagination-numbers /-->
			<!-- wp:query-pagination-next /-->
		<!-- /wp:query-pagination -->

	</div>
	<!-- /wp:query -->

</main>
<!-- /wp:group -->

<!-- wp:template-part {"slug":"footer"} /-->
